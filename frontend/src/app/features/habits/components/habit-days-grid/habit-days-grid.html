<div class="habit-grid">
    <div class="habit-column">
      <div class="cell day-name-cell" *ngFor="let day of dayNames">{{ day }}</div>
    </div>

    @for(week of weeks; track week; let index = $index) {
      <div class="habit-column">
        <div class="cell">{{index}}</div>
        @for( day of week; track day){
          <div class="cell day-cell" [class.empty]="day.empty" [class.completed]="day.completed"></div>
        }
      </div>
    }
</div>
